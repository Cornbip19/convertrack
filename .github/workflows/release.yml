name: Build & Release

# Packages the plugin into a correctly-structured zip and attaches it to a
# GitHub Release whenever a version tag (e.g. v1.0.1) is pushed. Connected
# WordPress sites pick up the new version from that release automatically.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build self-hosted zip (with GitHub self-updater)
        run: |
          PLUGIN=convertrack
          mkdir -p build/$PLUGIN
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build' \
            --exclude '*.zip' \
            --exclude '.gitignore' \
            --exclude 'README.md' \
            ./ build/$PLUGIN/
          cd build && zip -r "../$PLUGIN.zip" "$PLUGIN"

      - name: Build WordPress.org zip (no self-updater — directory handles updates)
        run: |
          PLUGIN=convertrack
          WPORG_PLUGIN=convertrack-click-conversion-analytics
          mkdir -p wporg/$WPORG_PLUGIN
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build' \
            --exclude 'wporg' \
            --exclude '*.zip' \
            --exclude '.gitignore' \
            --exclude 'README.md' \
            --exclude 'includes/class-updater.php' \
            ./ wporg/$WPORG_PLUGIN/
          cd wporg && zip -r "../$PLUGIN-wordpress-org.zip" "$WPORG_PLUGIN"

      # Only the self-hosted zip goes on the release: GitHub sorts release
      # assets alphabetically, so attaching the wordpress.org build too would
      # make older self-updaters (which take the first .zip) install a build
      # without the updater. The wp.org zip is kept as a workflow artifact.
      - name: Keep WordPress.org zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: convertrack-wordpress-org
          path: convertrack-wordpress-org.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            convertrack.zip
          generate_release_notes: true
